name: Preview Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS
        id: eas
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            2>/dev/null)
          echo "apk_url=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl')" >> $GITHUB_OUTPUT
          echo "build_number=$(echo "$BUILD_JSON" | jq -r '.[0].appBuildVersion')" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          curl -L "${{ steps.eas.outputs.apk_url }}" \
            -o roaster-v${{ steps.eas.outputs.build_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.eas.outputs.build_number }}
          name: Preview v${{ steps.eas.outputs.build_number }}
          generate_release_notes: true
          files: roaster-v${{ steps.eas.outputs.build_number }}.apk
